user  nginx;      
worker_processes  auto;      
      
error_log  /usr/local/nginx/logs/nginx_error.log;      
pid        /usr/local/nginx/logs/nginx.pid;      
worker_rlimit_nofile 51200;

stream {    
    log_format tcp_format '$time_local|$remote_addr|$protocol|$status|$bytes_sent|$bytes_received|$session_time|$upstream_addr|$upstream_bytes_sent|$upstream_bytes_received|$upstream_connect_time';    
      
    access_log /usr/local/nginx/logs/stream-access.log tcp_format;    
    error_log /usr/local/nginx/logs/stream-error.log;    
    include /usr/local/nginx/stream/*.conf;    
}    
    
events {    
        use epoll;    
        worker_connections 51200;    
        multi_accept on;    
    }    
      
http {      
    include       mime.types;      
    default_type  application/octet-stream;      
    proxy_cache_path /usr/local/nginx/proxy_temp/nginx_cache levels=1:2 keys_zone=my_cache_zone:10m max_size=100m inactive=60m use_temp_path=off;      
    
    # 请求头大小设置    
    server_names_hash_bucket_size 512;    
    client_header_buffer_size 32k;  
    client_body_buffer_size 512k;    
    large_client_header_buffers 4 32k;    
    client_max_body_size 50m;    
        
    # 开启高性能传输      
    sendfile on;      
    tcp_nopush on;      
    tcp_nodelay on;      
      
    # 长连接设置      
    keepalive_timeout 65;      
    keepalive_requests 100;      
    
    # Fastcgi设置    
    fastcgi_connect_timeout 300;    
    fastcgi_send_timeout 300;    
    fastcgi_read_timeout 300;    
    fastcgi_buffer_size 64k;    
    fastcgi_buffers 4 64k;    
    fastcgi_busy_buffers_size 128k;    
    fastcgi_temp_file_write_size 256k;    
    fastcgi_intercept_errors on;    
  
    #开启brotli配置      
    brotli on;      
    #压缩等级      
    brotli_comp_level 8;    
    brotli_static on;    
    brotli_min_length 1k;     
    brotli_window 512k;       
    #设置压缩 MIME 类型      
    brotli_types   
        application/atom+xml   
        application/javascript   
        application/json   
        application/vnd.api+json   
        application/rss+xml  
        application/vnd.ms-fontobject   
        application/x-font-opentype   
        application/x-font-truetype  
        application/x-font-ttf   
        application/x-javascript   
        application/xhtml+xml   
        application/xml  
        font/eot font/opentype   
        font/otf font/truetype   
        image/svg+xml   
        image/vnd.microsoft.icon  
        image/x-icon   
        image/x-win-bitmap   
        text/css   
        text/javascript   
        text/plain   
        text/xml;  
        
    # 启用 Gzip 压缩      
    gzip on;      
    gzip_disable   "MSIE [1-6]\.";  # 禁用 IE 1-6 gzip，避免兼容性问题        
    # 压缩等级（1-9，默认是1，推荐使用 4-6，性能和压缩比平衡）      
    gzip_comp_level 7;  
    gzip_static on;       
    # 最小压缩字节（小于此值不压缩）      
    gzip_min_length 1k;        
    # 压缩缓存      
    gzip_buffers 16 8k;           
    # 设置压缩 MIME 类型      
    gzip_types        
        text/plain   
        application/javascript   
        application/x-javascript   
        text/javascript   
        text/css   
        application/xml   
        application/json   
        image/jpeg   
        image/gif   
        image/png   
        font/ttf   
        font/otf   
        image/svg+xml   
        application/xml+rss   
        text/x-js;      
      
    # 保证压缩请求符合条件      
    gzip_proxied   expired no-cache no-store private auth;      
    # 添加 gzip 压缩标识头      
    gzip_vary on;    
    gzip_http_version 1.1;      
    
    # 设置按客户端 IP 地址进行连接限制的共享内存区域，`10m` 表示为每个 IP 地址分配 10MB 内存。    
    limit_conn_zone $binary_remote_addr zone=perip:10m;    
    # 设置按服务器名称进行连接限制的共享内存区域    
    limit_conn_zone $server_name zone=perserver:10m;    
    # 禁用 Nginx 在响应头中返回版本信息    
    server_tokens off;    
    # 禁用访问日志。会阻止 Nginx 记录访问日志，通常用于提高性能，但也会失去访问日志的记录。    
    #access_log off;    
                
          
    # 主日志配置                              
    log_format main '$remote_addr - $remote_user [$time_local] '    
                '"$request" $status $body_bytes_sent '    
                '"$http_referer" "$http_user_agent" "$http_x_forwarded_for" '                    
                'Country: $geoip2_data_country_name '    
                'Code: $geoip2_data_country_code '    
                'City: $geoip2_data_city_name Region: $geoip2_data_region_name '    
                'Location: $geoip2_data_latitude $geoip2_data_longitude '    
                'ASN: $geoip2_data_asn ($geoip2_data_asn_number)';    
  
  
#  
#    log_format json escape=json '{'  
#                    '"remote_addr": "$remote_addr", '  
#                    '"request_uri": "$request_uri", '  
#                    '"request_length": "$request_length", '  
#                    '"request_time": "$request_time", '  
#                    '"request_method": "$request_method", '                     
#                    '"status": "$status", '  
#                    '"body_bytes_sent": "$body_bytes_sent", '  
#                    '"http_referer": "$http_referer", '  
#                    '"http_user_agent": "$http_user_agent", '  
#                    '"http_x_forwarded_for": "$http_x_forwarded_for", '  
#                    '"http_host": "$http_host", '  
#                    '"server_name": "$server_name", '  
#                    '"upstream": "$upstream_addr", '  
#                    '"upstream_response_time": "$upstream_response_time", '  
#                    '"upstream_status": "$upstream_status", '  
#                    '"geoip_country_code": "$geoip2_data_country_code", '  
#                    '"geoip_country_name": "$geoip2_data_country_name", '  
#                    '"geoip_city_name": "$geoip2_data_city_name"'  
#                    '"geoip_asn": "$geoip2_data_asn"'  
#                    '"geoip_asn_number": "$geoip2_data_asn_number"'  
#                    '}';  
  
log_format json escape=json '{'  
    '"msec": "$msec", '  # request unixtime in seconds with a milliseconds resolution  
    '"connection": "$connection", '  # connection serial number  
    '"connection_requests": "$connection_requests", '  # number of requests made in connection  
    '"pid": "$pid", '  # process pid  
    '"request_id": "$request_id", '  # the unique request id  
    '"request_length": "$request_length", '  # request length (including headers and body)  
    '"remote_addr": "$remote_addr", '  # client IP  
    '"remote_user": "$remote_user", '  # client HTTP username  
    '"remote_port": "$remote_port", '  # client port  
    '"time_local": "$time_local", '  
    '"time_iso8601": "$time_iso8601", '  # local time in the ISO 8601 standard format  
    '"request": "$request", '  # full path no arguments if the request  
    '"request_uri": "$request_uri", '  # full path and arguments if the request  
    '"args": "$args", '  # args  
    '"status": "$status", '  # response status code  
    '"body_bytes_sent": "$body_bytes_sent", '  # the number of body bytes exclude headers sent to a client  
    '"bytes_sent": "$bytes_sent", '  # the number of bytes sent to a client  
    '"http_referer": "$http_referer", '  # HTTP referer  
    '"http_user_agent": "$http_user_agent", '  # user agent  
    '"http_x_forwarded_for": "$http_x_forwarded_for", '  # http_x_forwarded_for  
    '"http_host": "$http_host", '  # the request Host: header  
    '"server_name": "$server_name", '  # the name of the vhost serving the request  
    '"request_time": "$request_time", '  # request processing time in seconds with msec resolution  
    '"upstream": "$upstream_addr", '  # upstream backend server for proxied requests  
    '"upstream_connect_time": "$upstream_connect_time", '  # upstream handshake time incl. TLS  
    '"upstream_header_time": "$upstream_header_time", '  # time spent receiving upstream headers  
    '"upstream_response_time": "$upstream_response_time", '  # time spend receiving upstream body  
    '"upstream_response_length": "$upstream_response_length", '  # upstream response length  
    '"upstream_cache_status": "$upstream_cache_status", '  # cache HIT/MISS where applicable  
    '"ssl_protocol": "$ssl_protocol", '  # TLS protocol  
    '"ssl_cipher": "$ssl_cipher", '  # TLS cipher  
    '"scheme": "$scheme", '  # http or https  
    '"request_method": "$request_method", '  # request method  
    '"server_protocol": "$server_protocol", '  # request protocol, like HTTP/1.1 or HTTP/2.0  
    '"pipe": "$pipe", '  # "p" if request was pipelined, "." otherwise  
    '"gzip_ratio": "$gzip_ratio", '  
    '"http_cf_ray": "$http_cf_ray", '  
    '"geoip_city_name": "$geoip2_data_city_name", '  
    '"geoip_country_code": "$geoip2_data_country_code", '  
    '"geoip_country_name": "$geoip2_data_country_name", '  
    '"geoip_asn": "$geoip2_data_asn", '  
    '"geoip_asn_number": "$geoip2_data_asn_number"'  
'}';  
  
  
    access_log  /usr/local/nginx/logs/access.log json;      
    error_log   /usr/local/nginx/logs/error.log;      
    
        
    # GeoIP2 配置       
    geoip2 /usr/local/nginx/conf/GeoIP/GeoLite2-City.mmdb {      
        #auto_reload 5m;  
        #$geoip2_data_country_name default=Unknown country names zh-CN;#中文显示  
        #$geoip2_data_city_name default=Unknown city names zh-CN;   #中文显示  
        $geoip2_data_country_name default=Unknown country names en;   
        $geoip2_data_country_code default=0 country iso_code;      
        $geoip2_data_city_name default=Unknown city names en;    
        #$geoip2_data_region_name default=Unknown subdivisions 0 iso_code;    
        $geoip2_data_region_name default=Unknown subdivisions 0 names en;    
        $geoip2_data_latitude default=0 location latitude;    
        $geoip2_data_longitude default=0 location longitude;    
    }      
    geoip2 /usr/local/nginx/conf/GeoIP/GeoLite2-ASN.mmdb {      
        #auto_reload 5m;    
        $geoip2_data_asn default=Unknown autonomous_system_organization;    
        $geoip2_data_asn_number default=0 autonomous_system_number;          
    }              
    # 引入NJS测试文件      
    js_import hello from /usr/local/nginx/conf/scripts/test.js;      
      
    # ModSecurity 启用      
    modsecurity on;      
    modsecurity_rules_file /usr/local/nginx/conf/modsecurity/modsecurity.conf;      
    #modsecurity_rules_file /usr/local/nginx/conf/modsecurity/test.conf;  
  
    #隐藏来源提升隐私  
    #add_header Referrer-Policy "no-referrer";  
    add_header Referrer-Policy "strict-origin-when-cross-origin";  
    #定义websocket是否升级变量  
    map $http_upgrade $connection_upgrade {  
        default upgrade;  
        ''      close;  
    }     
    # 引入网站的配置文件    
    include /usr/local/nginx/conf/www/*.conf;    
    #include /usr/local/nginx/conf/emby/emby.conf;    
    #include /usr/local/nginx/conf/embyfast/embyfast.conf;       
}
