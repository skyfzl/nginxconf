server {    
        listen       80;    
        #listen       [::]:80;    
        server_name  localhost;    
          
        location / {    
            root   /usr/local/nginx/html;    
            index  index.html index.htm;    
        }  
            
        error_page   500 502 503 504  /50x.html;  
        location = /50x.html {  
            root   /usr/local/nginx/html;  
        }  
        # JS 测试    
        location /js {    
            default_type text/plain;    
            js_content hello;    
        }    
    
        # GeoIP2 测试    
        location /geoip {    
            default_type text/plain;    
            return 200 "Country: $geoip2_data_country_name";    
        }    
    
        # 状态页    
        location /status {    
            stub_status;    
        }    
            
        # 示例：Substitution 模块    
        subs_filter 'Hello' 'Hi' gi;    
    
        # 示例：缓存清除（需要 ngx_cache_purge 配合）    
        location ~ /purge(/.*) {    
            allow 127.0.0.1;    
            deny all;    
            proxy_cache_purge my_cache_zone $1;    
        }    
    
        # DAV 模块（上传/写入等 WebDAV 支持）    
        location /webdav/ {    
            root /var/www;    
            dav_methods PUT DELETE MKCOL COPY MOVE;    
            dav_ext_methods PROPFIND OPTIONS;    
            create_full_put_path  on;    
            client_body_temp_path /tmp;    
            client_max_body_size 100m;    
        }    
}
